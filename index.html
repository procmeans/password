<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>password</title>
  <style>
    :root {
      --bg: #0f1116;
      --card: #171a21;
      --text: #e6e8ec;
      --muted: #9aa0ab;
      --accent: #6ea8fe;
      --border: #262b35;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7f9;
        --card: #ffffff;
        --text: #1a1d23;
        --muted: #5b616b;
        --accent: #2563eb;
        --border: #e5e7eb;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }
    .tagline { color: var(--muted); margin: 0 0 28px; }
    h2 {
      font-size: 1.05rem;
      margin: 28px 0 8px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    p { margin: 8px 0; }
    .todo { color: var(--muted); font-style: italic; }
    footer {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>password</h1>
    <p class="tagline">A repository for password-related tooling.</p>

    <h2>Getting Started</h2>
    <p class="todo">TODO: Describe what this project does and how to use it.</p>

    <h2>License</h2>
    <p class="todo">TODO: Add a license.</p>

    <footer>
      Source: <a href="https://github.com/procmeans/password">github.com/procmeans/password</a>
    </footer>
  </main>
</body>
</html>
